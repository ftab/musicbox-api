openapi: 3.0.3
info:
  title: MusicBox API
  description: >
    REST API for MusicBox, an IRC bot that tracks music links shared in chat.
    All endpoints return JSON. Paginated endpoints accept a `page` query parameter
    and return `{ data: [...], meta: { page, total, perPage } }`.
  version: 0.0.1

servers:
  - url: /api
    description: Same-origin API

tags:
  - name: Leaderboard
    description: User rankings by video count
  - name: Users
    description: User lookups and per-user statistics
  - name: Videos
    description: Video lists and metadata
  - name: Tracks
    description: Aggregate track statistics across all users
  - name: Activity
    description: Recent play history across all users
  - name: Admin
    description: Diagnostic endpoints

paths:
  /leaderboard:
    get:
      tags: [Leaderboard]
      summary: Top users by video count
      description: Returns users ranked by the number of unique videos they have shared, grouping aliased nicknames under their primary nick.
      parameters:
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated leaderboard
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/LeaderboardEntry'
              example:
                data:
                  - nickname: fury
                    video_count: 6812
                  - nickname: dan
                    video_count: 4201
                meta:
                  page: 1

  /users:
    get:
      tags: [Users]
      summary: All users
      parameters:
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'

  /users/{nickname}/stats:
    get:
      tags: [Users]
      summary: Per-user statistics
      description: Returns aggregate play statistics for a user, resolved across all of their known aliases.
      parameters:
        - name: nickname
          in: path
          required: true
          schema:
            type: string
          example: fury
      responses:
        '200':
          description: User stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserStats'
              example:
                data:
                  - nickname: fury
                    totalPlays: 8941
                    uniqueVideos: 6812
                    firstShared: '2020-03-15T00:00:00.000Z'
                    mostRecentPlayed: '2026-03-01T00:00:00.000Z'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos:
    get:
      tags: [Videos]
      summary: Videos for a user
      description: Returns all videos shared by a user (including aliases), excluding hidden entries.
      parameters:
        - name: userid
          in: query
          required: true
          schema:
            type: integer
          example: 1
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated video list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Video'

  /tracks/top:
    get:
      tags: [Tracks]
      summary: Most-played tracks globally
      description: Returns tracks ranked by total play count aggregated across all users. Excludes admin-hidden entries.
      parameters:
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated top tracks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TopTrack'
              example:
                data:
                  - videoId: 42
                    title: Stumbleine - Cherry Blossom
                    youtubeId: AbCdEfGhIjK
                    soundcloudId: null
                    soundcloudUrl: null
                    vimeoId: null
                    bandcampId: null
                    totalPlays: 37

  /activity:
    get:
      tags: [Activity]
      summary: Recent play activity
      description: Returns the most recently played entries across all users, ordered by timestamp descending.
      parameters:
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated activity feed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ActivityEntry'
              example:
                data:
                  - nickname: fury
                    title: Stumbleine - Cherry Blossom
                    youtubeId: AbCdEfGhIjK
                    soundcloudId: null
                    soundcloudUrl: null
                    vimeoId: null
                    bandcampId: null
                    lastPlayedTimestamp: '2026-03-01T14:22:00.000Z'

  /admin/videos/broken:
    get:
      tags: [Admin]
      summary: Videos with API fetch failures
      description: Returns videos where the metadata API has failed one or more times, sorted by failure count descending. Useful for diagnosing broken links.
      parameters:
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated broken video list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/BrokenVideo'

components:
  parameters:
    page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for paginated results

  schemas:
    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        meta:
          type: object
          properties:
            page:
              type: integer
            total:
              type: array
              description: Raw COUNT(*) result from MySQL
            perPage:
              type: string

    Error:
      type: object
      properties:
        message:
          type: string

    LeaderboardEntry:
      type: object
      properties:
        nickname:
          type: string
        video_count:
          type: integer

    User:
      type: object
      properties:
        userId:
          type: integer
        nickname:
          type: string

    UserStats:
      type: object
      properties:
        nickname:
          type: string
        totalPlays:
          type: integer
        uniqueVideos:
          type: integer
        firstShared:
          type: string
          format: date-time
          nullable: true
        mostRecentPlayed:
          type: string
          format: date-time
          nullable: true

    Video:
      type: object
      properties:
        uservideoId:
          type: integer
        videoId:
          type: integer
        youtubeId:
          type: string
          nullable: true
        soundcloudId:
          type: string
          nullable: true
        soundcloudUrl:
          type: string
          nullable: true
        vimeoId:
          type: string
          nullable: true
        bandcampId:
          type: string
          nullable: true
          description: "Format: artistSlug;trackSlug"
        isFlagged:
          type: integer
          enum: [0, 1]
        tags:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        playCount:
          type: integer
        lastPlayedTimestamp:
          type: string
          format: date-time

    TopTrack:
      type: object
      properties:
        videoId:
          type: integer
        title:
          type: string
          nullable: true
        youtubeId:
          type: string
          nullable: true
        soundcloudId:
          type: string
          nullable: true
        soundcloudUrl:
          type: string
          nullable: true
        vimeoId:
          type: string
          nullable: true
        bandcampId:
          type: string
          nullable: true
        totalPlays:
          type: integer

    ActivityEntry:
      type: object
      properties:
        nickname:
          type: string
        title:
          type: string
          nullable: true
        youtubeId:
          type: string
          nullable: true
        soundcloudId:
          type: string
          nullable: true
        soundcloudUrl:
          type: string
          nullable: true
        vimeoId:
          type: string
          nullable: true
        bandcampId:
          type: string
          nullable: true
        lastPlayedTimestamp:
          type: string
          format: date-time

    BrokenVideo:
      type: object
      properties:
        videoId:
          type: integer
        title:
          type: string
          nullable: true
        youtubeId:
          type: string
          nullable: true
        soundcloudId:
          type: string
          nullable: true
        vimeoId:
          type: string
          nullable: true
        bandcampId:
          type: string
          nullable: true
        apiFailures:
          type: integer
        latestApiSuccess:
          type: string
          format: date-time
          nullable: true
