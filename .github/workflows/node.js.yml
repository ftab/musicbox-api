# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ircbot
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - name: Write CI database config
      run: |
        cat > config.js << 'EOF'
        const config = {
          db: {
            host: "127.0.0.1",
            user: "root",
            password: "root",
            database: "ircbot",
            connectTimeout: 60000
          },
          {
            server: "https://cytu.be",
            channel: "MusicBox",
          },
          listPerPage: 10000,
        };
        module.exports = config;
        EOF
    - name: Initialize database schema
      run: mysql -h 127.0.0.1 -uroot -proot ircbot < db.sql
    - name: Seed test data
      run: mysql -h 127.0.0.1 -uroot -proot ircbot < seed.sql
    - run: npm test
    - run: find .
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Create SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
      - name: Deploy with rsync
        run: rsync -rav --delete --filter 'protect /config.js' --filter 'protect /node_modules/' . musicbox@${{ secrets.MUSICBOX_SERVER_IP }}:/home/musicbox/api/production/
      - name: Install dependencies
        run: |
          ssh musicbox@${{ secrets.MUSICBOX_SERVER_IP }} <<'ENDSSH'
          cd api/production
          npm install
          npm run build
          mkdir -p ~/.config/systemd/user
          cp musicbox-api.service ~/.config/systemd/user/
          systemctl --user daemon-reload
          systemctl --user restart musicbox-api
          ENDSSH
